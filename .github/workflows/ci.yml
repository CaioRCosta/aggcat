name: CI

on:
  pull_request:
    branches: [main]
  push: 
    branches: [main]

jobs:
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (cloc)
        run: sudo apt-get install -y cloc

      - name: Install project dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Update test count badge in README
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          COUNT=$(pytest tests/ --tb=no -q 2>/dev/null | grep -oP '^\d+(?= passed)')
          sed -i "s|tests-[0-9]*%20passing|tests-${COUNT}%20passing|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || git commit -am "ci: update test count badge [skip ci]"
          git push